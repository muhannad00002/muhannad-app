# Render Blueprint — deploys the Zaffa backend + PostgreSQL database.
# Docs: https://render.com/docs/blueprint-spec
# One-click: https://render.com/deploy?repo=https://github.com/muhannad00002/muhannad-app
services:
  - type: web
    name: zaffa-backend
    runtime: node
    plan: free
    rootDir: wedding/server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/payments/status
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zaffa-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_RETURN_URL
        value: https://muhannad00002.github.io/muhannad-app/wedding/app/index.html
      # Fill these three in the Render dashboard (never commit them to git):
      - key: SMARTPAY_MERCHANT_ID
        sync: false
      - key: SMARTPAY_ACCESS_CODE
        sync: false
      - key: SMARTPAY_WORKING_KEY
        sync: false
      - key: SMARTPAY_TXN_URL
        value: https://smartpaytrns.bankmuscat.com/transaction.do?command=initiateTransaction
      - key: SMARTPAY_CURRENCY
        value: OMR
      # Admin account for the dashboard (set your own email + a strong password):
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Apple IAP (add later when App Store Connect is ready):
      - key: APPLE_SHARED_SECRET
        sync: false
      - key: APPLE_BUNDLE_ID
        value: com.zaffa.app

databases:
  - name: zaffa-db
    plan: free
