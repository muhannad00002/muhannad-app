<meta charset="utf-8">
<title>Sayr — Scan &amp; Go Commerce Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
/* ============ SAYR DESIGN SYSTEM ============ */
:root{
  --ground:#F4F7F5; --surface:#FFFFFF; --surface2:#EDF2EF; --surface3:#E2EAE5;
  --ink:#17211D; --ink2:#4C5B54; --ink3:#7B8A82; --line:#DCE5DF; --line2:#C9D6CE;
  --accent:#0E8A6D; --accent-ink:#0B6E57; --accent-soft:#E0F0EA; --on-accent:#FFFFFF;
  --good:#0E8A6D; --good-soft:#E0F0EA; --warn:#B7791F; --warn-soft:#F7EDDC; --crit:#C43D3D; --crit-soft:#F8E4E4;
  --c1:#0E8A6D; --c2:#4477CC; --c3:#B7791F; --c4:#A24E8E; --c5:#6459D8;
  --shadow-1:0 1px 2px rgba(23,33,29,.06),0 1px 3px rgba(23,33,29,.08);
  --shadow-2:0 4px 12px rgba(23,33,29,.08),0 2px 4px rgba(23,33,29,.05);
  --shadow-3:0 12px 32px rgba(23,33,29,.16),0 4px 8px rgba(23,33,29,.06);
  --r-s:8px; --r-m:12px; --r-l:18px; --r-full:999px;
  --font-d:"Avenir Next",Seravek,"Gill Sans",ui-sans-serif,system-ui,sans-serif;
  --font-b:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --font-m:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --dur:.22s; --ease:cubic-bezier(.3,.8,.3,1);
}
@media (prefers-color-scheme:dark){:root{
  --ground:#0D1311; --surface:#161D1A; --surface2:#1D2622; --surface3:#25302B;
  --ink:#E9F0EC; --ink2:#A7B5AD; --ink3:#75847C; --line:#28332D; --line2:#354139;
  --accent:#2FBF96; --accent-ink:#4ED2AC; --accent-soft:#193B31; --on-accent:#07231B;
  --good:#2FBF96; --good-soft:#193B31; --warn:#D9A544; --warn-soft:#3A2F17; --crit:#E06C6C; --crit-soft:#3D1F1F;
  --c1:#149C77; --c2:#4A7FD6; --c3:#BE8A1E; --c4:#BC5FA8; --c5:#7A6FE3;
  --shadow-1:0 1px 2px rgba(0,0,0,.4); --shadow-2:0 4px 14px rgba(0,0,0,.45);
  --shadow-3:0 16px 40px rgba(0,0,0,.55);
}}
:root[data-theme="light"]{
  --ground:#F4F7F5; --surface:#FFFFFF; --surface2:#EDF2EF; --surface3:#E2EAE5;
  --ink:#17211D; --ink2:#4C5B54; --ink3:#7B8A82; --line:#DCE5DF; --line2:#C9D6CE;
  --accent:#0E8A6D; --accent-ink:#0B6E57; --accent-soft:#E0F0EA; --on-accent:#FFFFFF;
  --good:#0E8A6D; --good-soft:#E0F0EA; --warn:#B7791F; --warn-soft:#F7EDDC; --crit:#C43D3D; --crit-soft:#F8E4E4;
  --c1:#0E8A6D; --c2:#4477CC; --c3:#B7791F; --c4:#A24E8E; --c5:#6459D8;
  --shadow-1:0 1px 2px rgba(23,33,29,.06),0 1px 3px rgba(23,33,29,.08);
  --shadow-2:0 4px 12px rgba(23,33,29,.08),0 2px 4px rgba(23,33,29,.05);
  --shadow-3:0 12px 32px rgba(23,33,29,.16),0 4px 8px rgba(23,33,29,.06);
}
:root[data-theme="dark"]{
  --ground:#0D1311; --surface:#161D1A; --surface2:#1D2622; --surface3:#25302B;
  --ink:#E9F0EC; --ink2:#A7B5AD; --ink3:#75847C; --line:#28332D; --line2:#354139;
  --accent:#2FBF96; --accent-ink:#4ED2AC; --accent-soft:#193B31; --on-accent:#07231B;
  --good:#2FBF96; --good-soft:#193B31; --warn:#D9A544; --warn-soft:#3A2F17; --crit:#E06C6C; --crit-soft:#3D1F1F;
  --c1:#149C77; --c2:#4A7FD6; --c3:#BE8A1E; --c4:#BC5FA8; --c5:#7A6FE3;
  --shadow-1:0 1px 2px rgba(0,0,0,.4); --shadow-2:0 4px 14px rgba(0,0,0,.45);
  --shadow-3:0 16px 40px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0}
html{height:100%}
body{height:100%;background:var(--ground);color:var(--ink);font-family:var(--font-b);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{height:100%}
h1,h2,h3,h4{font-family:var(--font-d);font-weight:600;line-height:1.25;text-wrap:balance}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}
input,select,textarea{font:inherit;color:var(--ink)}
svg{display:block;flex:none}
::selection{background:var(--accent-soft)}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
.num{font-variant-numeric:tabular-nums}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.muted{color:var(--ink2)} .small{font-size:13px}
a{color:var(--accent-ink);text-decoration:none}

/* ---- Buttons ---- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;font-size:14px;
  padding:9px 16px;border-radius:var(--r-m);border:1px solid transparent;transition:all var(--dur) var(--ease);
  white-space:nowrap;user-select:none}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--accent);color:var(--on-accent)}
.btn-pri:hover{filter:brightness(1.08)}
.btn-sec{background:var(--surface);border-color:var(--line2);color:var(--ink);box-shadow:var(--shadow-1)}
.btn-sec:hover{background:var(--surface2)}
.btn-ghost{color:var(--ink2)} .btn-ghost:hover{background:var(--surface2);color:var(--ink)}
.btn-danger{background:var(--crit);color:#fff}
.btn-soft{background:var(--accent-soft);color:var(--accent-ink)}
.btn-lg{padding:13px 22px;font-size:15px;border-radius:14px}
.btn-sm{padding:5px 10px;font-size:13px;border-radius:8px}
.btn-block{width:100%}
.btn[disabled]{opacity:.45;pointer-events:none}
.iconbtn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;
  color:var(--ink2);transition:background var(--dur)}
.iconbtn:hover{background:var(--surface2);color:var(--ink)}

/* ---- Cards / surfaces ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);box-shadow:var(--shadow-1)}
.card-pad{padding:20px}
.panel{background:var(--surface2);border-radius:var(--r-m);padding:14px}
.divider{height:1px;background:var(--line);border:0}

/* ---- Chips / badges ---- */
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:var(--r-full)}
.chip-good{background:var(--good-soft);color:var(--good)}
.chip-warn{background:var(--warn-soft);color:var(--warn)}
.chip-crit{background:var(--crit-soft);color:var(--crit)}
.chip-neutral{background:var(--surface2);color:var(--ink2)}
.chip-accent{background:var(--accent-soft);color:var(--accent-ink)}
.dot{width:7px;height:7px;border-radius:50%;flex:none}

/* ---- Forms ---- */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:600;color:var(--ink2)}
.input,select.input,textarea.input{background:var(--surface);border:1px solid var(--line2);border-radius:var(--r-m);
  padding:9px 12px;font-size:14px;width:100%;transition:border-color var(--dur)}
.input:focus{outline:none;border-color:var(--accent)}
.input::placeholder{color:var(--ink3)}
.input.invalid{border-color:var(--crit)}
.field .err{font-size:12px;color:var(--crit);display:none}
.field.show-err .err{display:block}
.searchbar{position:relative;display:flex;align-items:center}
.searchbar svg{position:absolute;left:11px;color:var(--ink3);pointer-events:none}
.searchbar .input{padding-left:36px}
.switch{position:relative;width:40px;height:24px;border-radius:99px;background:var(--surface3);transition:background var(--dur);flex:none}
.switch[aria-checked="true"]{background:var(--accent)}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;
  box-shadow:var(--shadow-1);transition:transform var(--dur) var(--ease)}
.switch[aria-checked="true"]::after{transform:translateX(16px)}

/* ---- Tables ---- */
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-l);background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:640px}
th{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);text-align:left;
  padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer} th.sortable:hover{color:var(--ink)}
td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr{transition:background .15s} tbody tr:hover{background:var(--surface2)}
tr.clickable{cursor:pointer}
td.r,th.r{text-align:right}

/* ---- Toasts ---- */
#toasts{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:900;display:flex;flex-direction:column;
  gap:8px;align-items:center;pointer-events:none;width:min(420px,92vw)}
.toast{display:flex;align-items:center;gap:9px;background:var(--ink);color:var(--ground);padding:11px 16px;
  border-radius:14px;box-shadow:var(--shadow-3);font-size:14px;font-weight:500;animation:toastIn .3s var(--ease);max-width:100%}
.toast svg{color:var(--accent)} .toast.t-err svg{color:var(--crit)} .toast.t-warn svg{color:var(--warn)}
.toast.out{animation:toastOut .25s forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(8px) scale(.97)}}

/* ---- Dialogs ---- */
.overlay{position:fixed;inset:0;background:rgba(10,16,13,.55);z-index:800;display:flex;align-items:center;
  justify-content:center;padding:20px;animation:fadeIn .2s;backdrop-filter:blur(3px)}
.dialog{background:var(--surface);border-radius:20px;box-shadow:var(--shadow-3);width:min(480px,100%);
  max-height:min(86vh,720px);display:flex;flex-direction:column;animation:dlgIn .28s var(--ease);border:1px solid var(--line)}
.dialog.wide{width:min(680px,100%)}
.dialog-h{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 0}
.dialog-h h3{font-size:17px}
.dialog-b{padding:16px 20px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.dialog-f{display:flex;gap:10px;justify-content:flex-end;padding:0 20px 18px}
@keyframes dlgIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ---- Skeletons / states ---- */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
  background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:8px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:48px 24px;gap:6px;color:var(--ink2)}
.state .state-icon{width:52px;height:52px;border-radius:16px;background:var(--surface2);display:flex;
  align-items:center;justify-content:center;color:var(--ink3);margin-bottom:8px}
.state h3{color:var(--ink);font-size:16px}
.state p{font-size:13.5px;max-width:300px}
.state .btn{margin-top:12px}

/* ---- Offline banner ---- */
.offline-banner{position:sticky;top:0;z-index:700;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--warn);color:#fff;font-size:13px;font-weight:600;padding:7px 12px}

/* ---- Launcher ---- */
.launcher{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 24px;gap:0;position:relative}
.launcher .wordmark{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.logo-mark{width:46px;height:46px;border-radius:14px;background:var(--accent);color:var(--on-accent);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-2)}
.launcher h1{font-size:clamp(26px,4.5vw,36px);letter-spacing:-.02em}
.launcher .tag{color:var(--ink2);margin:6px 0 34px;text-align:center;max-width:440px;text-wrap:balance}
.role-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;width:min(920px,100%)}
.role-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:22px 20px;text-align:left;
  display:flex;flex-direction:column;gap:10px;transition:all var(--dur) var(--ease);box-shadow:var(--shadow-1);cursor:pointer}
.role-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-2);border-color:var(--accent)}
.role-card .role-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.role-card h3{font-size:16px}
.role-card p{font-size:13px;color:var(--ink2)}
.role-card .go{margin-top:auto;font-size:13px;font-weight:600;color:var(--accent-ink);display:flex;align-items:center;gap:4px}
.launcher-foot{margin-top:32px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

/* ---- Phone frame (customer) ---- */
.phone-stage{min-height:100%;display:flex;align-items:center;justify-content:center;padding:28px 16px;position:relative}
.phone{width:400px;max-width:100%;height:min(820px,calc(100vh - 56px));min-height:560px;background:var(--surface);
  border-radius:38px;border:1px solid var(--line2);box-shadow:var(--shadow-3);overflow:hidden;display:flex;
  flex-direction:column;position:relative}
@media (max-width:520px){
  .phone-stage{padding:0}
  .phone{width:100%;height:100vh;height:100dvh;border-radius:0;border:0;min-height:0}
  .stage-side{display:none}
}
.stage-side{position:absolute;top:24px;right:24px;display:flex;flex-direction:column;gap:8px}
.phone-screen{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;background:var(--ground);position:relative}
.phone-header{display:flex;align-items:center;gap:10px;padding:16px 18px 10px;position:sticky;top:0;
  background:var(--ground);z-index:5}
.phone-header h2{font-size:19px;letter-spacing:-.01em;flex:1}
.tabbar{display:flex;border-top:1px solid var(--line);background:var(--surface);padding:6px 8px calc(8px + env(safe-area-inset-bottom))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;
  color:var(--ink3);padding:6px 2px;border-radius:10px;position:relative;transition:color var(--dur)}
.tab.active{color:var(--accent-ink)}
.tab .badge{position:absolute;top:0;right:calc(50% - 20px);background:var(--crit);color:#fff;font-size:10px;
  min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.screen-body{flex:1;padding:4px 18px 24px;display:flex;flex-direction:column;gap:14px}
.screen-enter{animation:screenIn .3s var(--ease)}
@keyframes screenIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* product visuals */
.pimg{border-radius:14px;display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;
  font-family:var(--font-d);font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.18)}

/* scanner */
.scanner{position:relative;flex:1;min-height:340px;background:#0B100E;border-radius:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden}
.scan-reticle{width:210px;height:210px;position:relative}
.scan-reticle::before{content:"";position:absolute;inset:0;border-radius:24px;
  background:
    linear-gradient(#3FDCB0,#3FDCB0) top left/34px 3px no-repeat,linear-gradient(#3FDCB0,#3FDCB0) top left/3px 34px no-repeat,
    linear-gradient(#3FDCB0,#3FDCB0) top right/34px 3px no-repeat,linear-gradient(#3FDCB0,#3FDCB0) top right/3px 34px no-repeat,
    linear-gradient(#3FDCB0,#3FDCB0) bottom left/34px 3px no-repeat,linear-gradient(#3FDCB0,#3FDCB0) bottom left/3px 34px no-repeat,
    linear-gradient(#3FDCB0,#3FDCB0) bottom right/34px 3px no-repeat,linear-gradient(#3FDCB0,#3FDCB0) bottom right/3px 34px no-repeat}
.scan-line{position:absolute;left:16px;right:16px;height:2px;background:linear-gradient(90deg,transparent,#3FDCB0,transparent);
  animation:scanSweep 2.2s ease-in-out infinite;top:20px}
@keyframes scanSweep{0%,100%{top:20px}50%{top:calc(100% - 20px)}}
.scan-chips{position:absolute;bottom:18px;left:0;right:0;display:flex;gap:8px;overflow-x:auto;padding:0 18px;scrollbar-width:none}
.scan-chips::-webkit-scrollbar{display:none}
.scan-chip{flex:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#EAF5F0;
  backdrop-filter:blur(8px);padding:8px 13px;border-radius:12px;font-size:13px;font-weight:600;display:flex;
  align-items:center;gap:7px;transition:background .2s}
.scan-chip:hover{background:rgba(63,220,176,.25)}
.qr-canvas{image-rendering:pixelated;border-radius:8px}

/* ---- Dashboard shell (merchant/vendor/admin) ---- */
.shell{display:flex;height:100vh;height:100dvh}
.sidebar{width:232px;flex:none;background:var(--surface);border-right:1px solid var(--line);display:flex;
  flex-direction:column;padding:18px 12px 14px;gap:2px;overflow-y:auto}
.sidebar .brand{display:flex;align-items:center;gap:10px;padding:0 8px 16px}
.sidebar .brand .logo-mark{width:34px;height:34px;border-radius:10px}
.sidebar .brand b{font-family:var(--font-d);font-size:15px;letter-spacing:-.01em;display:block;line-height:1.2}
.sidebar .brand span{font-size:11.5px;color:var(--ink3);display:block}
.navlink{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;font-size:13.5px;
  font-weight:500;color:var(--ink2);transition:all .16s;width:100%;text-align:left;position:relative}
.navlink:hover{background:var(--surface2);color:var(--ink)}
.navlink.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.navlink .badge{margin-left:auto;background:var(--crit);color:#fff;font-size:10.5px;font-weight:700;
  min-width:17px;height:17px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 5px}
.nav-section{padding:14px 12px 5px}
.sidebar-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:2px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;gap:12px;padding:13px 26px;border-bottom:1px solid var(--line);
  background:var(--surface);flex:none;min-height:60px}
.topbar h1{font-size:18px;letter-spacing:-.01em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.content{flex:1;overflow-y:auto;padding:24px 26px 48px;scroll-behavior:smooth}
.content-inner{max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:20px}
.mobile-nav{display:none}
@media (max-width:860px){
  .sidebar{display:none}
  .topbar{padding:10px 14px}
  .content{padding:16px 14px 90px}
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--surface);
    border-top:1px solid var(--line);z-index:600;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
}

/* ---- KPI / stat tiles ---- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);padding:16px 18px;
  display:flex;flex-direction:column;gap:4px;box-shadow:var(--shadow-1)}
.kpi .kpi-label{font-size:12px;font-weight:600;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px}
.kpi .kpi-value{font-family:var(--font-d);font-size:26px;font-weight:700;letter-spacing:-.02em}
.kpi .kpi-delta{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:3px}
.kpi .up{color:var(--good)} .kpi .down{color:var(--crit)}

/* ---- Charts ---- */
.chart-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-l);padding:18px 18px 10px;box-shadow:var(--shadow-1)}
.chart-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.chart-h h3{font-size:15px}
.chart-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--ink2)}
.chart-legend .lg{display:flex;align-items:center;gap:6px}
.chart-legend .sw{width:10px;height:10px;border-radius:3px}
.chart-tip{position:fixed;z-index:950;background:var(--ink);color:var(--ground);font-size:12.5px;padding:8px 11px;
  border-radius:10px;pointer-events:none;box-shadow:var(--shadow-2);max-width:230px;display:none}
.chart-tip b{display:block;margin-bottom:2px}
.chart-tip .row{display:flex;align-items:center;gap:6px;justify-content:space-between}

const esc = s => String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---- persistence ---- */
const DB_KEY = "sayr_db_v7";
let DB;
try{ const raw = localStorage.getItem(DB_KEY); DB = raw ? JSON.parse(raw) : null; if(!DB || DB.v!==7) DB = null; }catch(e){ DB = null; }
if(!DB) DB = seedDB();
let saveT = null;
function save(){ clearTimeout(saveT); saveT = setTimeout(()=>{ try{localStorage.setItem(DB_KEY, JSON.stringify(DB));}catch(e){} }, 250); }
function resetDB(){ try{localStorage.removeItem(DB_KEY);}catch(e){} location.hash=""; location.reload(); }
SG.DB = DB; SG.save = save; SG.resetDB = resetDB;

/* ---- lookups ---- */
const productById = id => DB.products.find(p=>p.id===id);
const vendorById  = id => DB.vendors.find(v=>v.id===id);
const branchById  = id => DB.branches.find(b=>b.id===id);
const empById     = id => DB.employees.find(e=>e.id===id);
SG.productById=productById; SG.vendorById=vendorById; SG.branchById=branchById; SG.empById=empById;

/* ---- aggregations ---- */
function ordersSince(days, branch){
  const cut = Date.now()-days*DAY;
  return DB.orders.filter(o=>o.ts>=cut && (!branch||o.branch===branch));
}
function sumSales(os){ return os.reduce((s,o)=>s+o.total,0); }
function seriesDaily(days, branch){
  const map = {};
  for(let d=days-1; d>=0; d--) map[dayKey(Date.now()-d*DAY)] = 0;
  ordersSince(days,branch).forEach(o=>{ const k=dayKey(o.ts); if(k in map) map[k]+=o.total; });
  return Object.entries(map).map(([date,v])=>({date,v:Math.round(v)}));
}
function topProducts(days, n=5, vendorId){
  const agg={};
  ordersSince(days).forEach(o=>o.items.forEach(it=>{
    if(vendorId && it.vendorId!==vendorId) return;
    agg[it.productId] = agg[it.productId]||{name:it.name,units:0,revenue:0,emoji:it.emoji,grad:it.grad,productId:it.productId};
    agg[it.productId].units+=it.qty; agg[it.productId].revenue+=it.price*it.qty;
  }));
  return Object.values(agg).sort((a,b)=>b.revenue-a.revenue).slice(0,n);
}
function lowStockList(){
  return DB.products.filter(p=>p.approved&&p.active&&p.id!=="gift").flatMap(p=>
    DB.branches.filter(b=>p.stock[b.id]!==undefined && p.stock[b.id]<=p.lowAt && p.stock[b.id]<900)
      .map(b=>({p,branch:b,qty:p.stock[b.id]}))
  ).sort((a,b)=>a.qty-b.qty);
}
function vendorAgg(vendorId, days){
  const os = ordersSince(days);
  let units=0, gross=0; const perDay={};
  for(let d=days-1;d>=0;d--) perDay[dayKey(Date.now()-d*DAY)]=0;
  os.forEach(o=>o.items.forEach(it=>{ if(it.vendorId===vendorId){ units+=it.qty; gross+=it.price*it.qty; const k=dayKey(o.ts); if(k in perDay) perDay[k]+=it.price*it.qty; }}));
  return {units, gross, series:Object.entries(perDay).map(([date,v])=>({date,v:Math.round(v)}))};
}
function deltaPct(days, branch){
  const cur = sumSales(ordersSince(days,branch));
  const prevOs = DB.orders.filter(o=>o.ts>=Date.now()-2*days*DAY && o.ts<Date.now()-days*DAY && (!branch||o.branch===branch));
  const prev = sumSales(prevOs);
  if(!prev) return null;
  return Math.round((cur-prev)/prev*100);
}
SG.ordersSince=ordersSince; SG.sumSales=sumSales; SG.seriesDaily=seriesDaily;
SG.topProducts=topProducts; SG.lowStockList=lowStockList; SG.vendorAgg=vendorAgg; SG.deltaPct=deltaPct;

/* ---- notifications ---- */
function notify(audience, icon, title, body){
  DB.notifications[audience].unshift({id:uid("n"), ts:Date.now(), icon, title, body, read:false});
  DB.notifications[audience] = DB.notifications[audience].slice(0,40);
  save();
  if(SG.onNotify) SG.onNotify(audience,title);
}
function logActivity(by, act){ DB.activity.unshift({ts:Date.now(), by, act}); DB.activity=DB.activity.slice(0,60); save(); }
SG.notify=notify; SG.logActivity=logActivity;

/* ---- cart & checkout transaction ---- */
function cartAdd(productId, qty=1){
  if(DB.cart.locked) return {ok:false, err:"Cart is locked while the cashier completes your checkout."};
  const p = productById(productId);
  if(!p) return {ok:false, err:"Product not found."};
  const branch = DB.cart.branch || "b1";
  const line = DB.cart.items.find(i=>i.productId===productId);
  const inCart = line? line.qty : 0;
  if(p.stock[branch]!==undefined && p.stock[branch] < inCart+qty) return {ok:false, err:"Only "+p.stock[branch]+" in stock at this branch."};
  if(line) line.qty+=qty; else DB.cart.items.push({productId, qty});
  save(); return {ok:true, p};
}
function cartSetQty(productId, qty){
  if(DB.cart.locked) return {ok:false};
  const i = DB.cart.items.findIndex(x=>x.productId===productId);
  if(i<0) return {ok:false};
  if(qty<=0) DB.cart.items.splice(i,1); else {
    const p=productById(productId); const branch=DB.cart.branch||"b1";
    if(p.stock[branch]!==undefined && qty>p.stock[branch]) return {ok:false, err:"Only "+p.stock[branch]+" in stock."};
    DB.cart.items[i].qty=qty;
  }
  save(); return {ok:true};
}
function cartTotals(cart){
  cart = cart||DB.cart;
  const lines = cart.items.map(i=>({...i, p:productById(i.productId)})).filter(l=>l.p);
  const sub = lines.reduce((s,l)=>s+l.p.price*l.qty,0);
  const coupon = cart.coupon ? DB.coupons.find(c=>c.code===cart.coupon&&c.active) : null;
  const extraDisc = cart.posDisc||0;
  const disc = (coupon? sub*coupon.pct/100 : 0) + extraDisc;
  const tax = Math.max(0,(sub-disc))*DB.settings.taxRate/100;
  return {lines, sub, disc, tax, total:Math.max(0,sub-disc)+tax, coupon};
}
function applyCoupon(code){
  const c = DB.coupons.find(c=>c.code===code.toUpperCase()&&c.active);
  if(!c) return {ok:false, err:"That code isn't valid or has expired."};
  DB.cart.coupon = c.code; save(); return {ok:true, c};
}
function issueCheckoutToken(){
  const t = {token:"CHK-"+Math.random().toString(36).slice(2,8).toUpperCase(), issued:Date.now(), ttl:5*60e3, cartSnapshot:null};
  DB.checkoutToken = t; DB.cart.locked = false; save(); return t;
}
function posScanToken(){
  const t = DB.checkoutToken;
  if(!t) return {ok:false, err:"No active checkout QR. Ask the customer to open their checkout code."};
  if(Date.now()-t.issued>t.ttl) return {ok:false, err:"Checkout code expired. Ask the customer to regenerate it."};
  if(!DB.cart.items.length) return {ok:false, err:"The customer's cart is empty."};
  DB.cart.locked = true;
  DB.posOrder = {token:t.token, scannedTs:Date.now(), posDisc:0};
  save(); return {ok:true};
}
function posComplete(method, cashierId){
  if(!DB.posOrder) return {ok:false, err:"No checkout in progress."};
  const cash = empById(cashierId)||DB.employees[2];
  const t = cartTotals({...DB.cart, posDisc:DB.posOrder.posDisc});
  if(!t.lines.length) return {ok:false, err:"Cart is empty."};
  const branch = DB.cart.branch||"b1";
  /* stock check then atomic-ish decrement */
  for(const l of t.lines){
    if(l.p.stock[branch]!==undefined && l.p.stock[branch]<l.qty) return {ok:false, err:"Insufficient stock for "+l.p.name+"."};
  }
  const order = {
    id:"SO-"+String(9000+DB.orders.length), ts:Date.now(), branch,
    customer:DB.customer.name, cashierId:cash.id,
    items:t.lines.map(l=>({productId:l.p.id,name:l.p.name,sku:l.p.sku,price:l.p.price,qty:l.qty,tax:DB.settings.taxRate,vendorId:l.p.vendorId,emoji:l.p.emoji,grad:l.p.grad})),
    sub:t.sub, disc:Math.round(t.disc*100)/100, coupon:DB.cart.coupon, posDisc:DB.posOrder.posDisc||0,
    tax:Math.round(t.tax*100)/100, total:Math.round(t.total*100)/100, method, status:"completed", live:true
  };
  const touchedVendors = new Set();
  t.lines.forEach(l=>{
    if(l.p.stock[branch]!==undefined && l.p.stock[branch]<900){
      l.p.stock[branch]-=l.qty;
      DB.movements.unshift({id:uid("m"),ts:Date.now(),productId:l.p.id,branch,delta:-l.qty,kind:"sale",by:cash.name,note:order.id});
      if(l.p.stock[branch]<=l.p.lowAt && DB.settings.lowStockAlerts)
        notify("merchant","alert","Low stock: "+l.p.name, l.p.stock[branch]+" left at "+branchById(branch).name+" (threshold "+l.p.lowAt+").");
    }
    if(l.p.vendorId) touchedVendors.add(l.p.vendorId);
  });
  DB.orders.push(order);
  const points = Math.round(order.total/10 * 1.5);
  DB.customer.points += points;
  touchedVendors.forEach(vid=>{
    const v=vendorById(vid); if(!v) return;
    const sold = order.items.filter(i=>i.vendorId===vid);
    notify("vendor","cart","New sale — "+sold.reduce((s,i)=>s+i.qty,0)+" unit(s)",
      sold.map(i=>i.qty+"× "+i.name).join(", ")+" · "+fmtT(sold.reduce((s,i)=>s+i.price*i.qty,0))+" gross.");
  });
  notify("customer","receipt","Receipt — "+order.id, fmtT(order.total)+" at "+DB.storeName+". +"+points+" loyalty points.");
  notify("merchant","cart","Order "+order.id+" completed", fmtT(order.total)+" · "+order.items.length+" item(s) · "+cash.name+" · "+(method==="applepay"?"Apple Pay":method));
  logActivity(cash.name, "Completed order "+order.id+" ("+fmtT(order.total)+")");
  DB.lastOrder = order;
  DB.cart = {items:[], coupon:null, branch:DB.cart.branch, locked:false};
  DB.checkoutToken = null; DB.posOrder = null;
  save();
  if(SG.onOrder) SG.onOrder(order);
  return {ok:true, order, points};
}
function posCancel(){ DB.cart.locked=false; DB.posOrder=null; save(); }
SG.cartAdd=cartAdd; SG.cartSetQty=cartSetQty; SG.cartTotals=cartTotals; SG.applyCoupon=applyCoupon;
SG.issueCheckoutToken=issueCheckoutToken; SG.posScanToken=posScanToken; SG.posComplete=posComplete; SG.posCancel=posCancel;

/* ---- inventory / product mutations ---- */
function adjustStock(productId, branch, delta, kind, note, by){
  const p=productById(productId); if(!p) return;
  p.stock[branch]=(p.stock[branch]||0)+delta;
  DB.movements.unshift({id:uid("m"),ts:Date.now(),productId,branch,delta,kind,by,note});
  logActivity(by, (delta>0?"Added ":"Removed ")+Math.abs(delta)+" × "+p.name+" ("+kind+")");
  save();
}
function upsertProduct(data){
  if(data.id){ const p=productById(data.id); Object.assign(p,data); logActivity("Noura Al-Fahad","Updated product "+p.name); save(); return p; }
  const rnd=Math.random;
  const p={id:uid("p"), name:data.name, cat:data.cat, vendorId:data.vendorId||null, price:+data.price, cost:Math.round(+data.price*.55),
    emoji:data.emoji||"🛍️", grad:[Math.floor(rnd()*360),Math.floor(rnd()*360)],
    sku:data.sku||("NB-"+data.cat.slice(0,2).toUpperCase()+"-"+String(100+DB.products.length+1)),
    barcode:"629"+String(Math.floor(rnd()*1e10)).padStart(10,"0"),
    stock:{b1:+data.stockB1||0,b2:+data.stockB2||0}, lowAt:8, active:true, approved:true, created:Date.now()};
  DB.products.push(p); logActivity("Noura Al-Fahad","Created product "+p.name); save(); return p;
}
function deleteProduct(id){ const i=DB.products.findIndex(p=>p.id===id); if(i>=0){ logActivity("Noura Al-Fahad","Deleted product "+DB.products[i].name); DB.products.splice(i,1); save(); } }
SG.adjustStock=adjustStock; SG.upsertProduct=upsertProduct; SG.deleteProduct=deleteProduct;

/* ---- vendor daily summary generator ---- */
function vendorDailySummary(vendorId){
  const v = vendorById(vendorId);
  const today = ordersSince(1);
  const per = {};
  today.forEach(o=>o.items.forEach(it=>{ if(it.vendorId===vendorId){ per[it.productId]=per[it.productId]||{name:it.name,units:0,value:0}; per[it.productId].units+=it.qty; per[it.productId].value+=it.price*it.qty; }}));
  const rows = Object.entries(per).map(([pid,r])=>{ const p=productById(pid); return {...r, remaining:p? (p.stock.b1||0)+(p.stock.b2||0) : 0, low:p? ((p.stock.b1||0)+(p.stock.b2||0))<=p.lowAt : false}; });
  const own = DB.products.filter(p=>p.vendorId===vendorId);
  const lows = own.filter(p=>((p.stock.b1||0)+(p.stock.b2||0))<=p.lowAt);
  const outs = own.filter(p=>((p.stock.b1||0)+(p.stock.b2||0))===0);
  const gross = rows.reduce((s,r)=>s+r.value,0);
  const pending = DB.settlements.find(s=>s.vendorId===vendorId&&s.status==="pending");
  return {v, rows, gross, lows, outs, pending};
}
SG.vendorDailySummary = vendorDailySummary;

/* ---- CSV export helper ---- */
function downloadCSV(filename, rows){
  const csv = rows.map(r=>r.map(c=>{ c=String(c??""); return /[",\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c; }).join(",")).join("\n");
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download=filename; document.body.appendChild(a); a.click(); a.remove();
}
SG.downloadCSV = downloadCSV;

/* ---- dialog ---- */
SG.dialog = ({title, body, actions, wide, onClose}) => {
  const ov = document.createElement("div");
  ov.className = "overlay";
  ov.innerHTML = '<div class="dialog'+(wide?' wide':'')+'" role="dialog" aria-modal="true" aria-label="'+esc(title)+'">'+
    '<div class="dialog-h"><h3>'+title+'</h3><button class="iconbtn" data-close aria-label="Close">'+icon("x",18)+'</button></div>'+
    '<div class="dialog-b">'+body+'</div>'+
    (actions?'<div class="dialog-f">'+actions+'</div>':'')+'</div>';
  const close = ()=>{ ov.remove(); document.removeEventListener("keydown",onKey); onClose&&onClose(); };
  const onKey = e=>{ if(e.key==="Escape") close(); };
  ov.addEventListener("click", e=>{ if(e.target===ov || e.target.closest("[data-close]")) close(); });
  document.addEventListener("keydown", onKey);
  document.body.appendChild(ov);
  const f = ov.querySelector("input,select,textarea,button:not([data-close])"); f&&f.focus();
  ov.close = close;
  return ov;
};
SG.confirm = ({title, message, danger, okLabel, cb}) => {

  d.querySelector("[data-ok]").onclick = ()=>{ d.close(); cb(); };

/* ---- states ---- */
SG.emptyState = (ic,title,desc,action) =>
  '<div class="state"><div class="state-icon">'+icon(ic,26)+'</div><h3>'+title+'</h3><p>'+desc+'</p>'+(action||"")+'</div>';
SG.errorState = (retryAct) =>
  '<div class="state"><div class="state-icon" style="color:var(--crit)">'+icon("alert",26)+'</div><h3>Something went wrong</h3><p>We couldn\'t load this view. Check your connection and try again.</p><button class="btn btn-sec" data-act="'+retryAct+'">'+icon("refresh",16)+' Retry</button></div>';
SG.skelRows = (n=4,h=52) => Array.from({length:n},()=>'<div class="skel" style="height:'+h+'px;margin-bottom:10px"></div>').join("");
SG.skelDash = () =>
  '<div class="kpis">'+Array.from({length:4},()=>'<div class="skel" style="height:96px"></div>').join("")+'</div>'+
  '<div class="skel" style="height:280px"></div><div class="skel" style="height:200px"></div>';

/* ---- fake QR matrix (visual simulation of a checkout token) ---- */
SG.qrSVG = (seedStr, size=200) => {
  let h = 2166136261;
  for(const c of seedStr){ h ^= c.charCodeAt(0); h = Math.imul(h, 16777619); }
  const rng = mulberry32ish(h);
  const N = 25, cell = size/N;
  let rects = "";
  const finder = (x,y)=>{
    rects += '<rect x="'+(x*cell)+'" y="'+(y*cell)+'" width="'+(7*cell)+'" height="'+(7*cell)+'" rx="'+cell+'" fill="none" stroke="currentColor" stroke-width="'+cell+'"/>' +
             '<rect x="'+((x+2)*cell)+'" y="'+((y+2)*cell)+'" width="'+(3*cell)+'" height="'+(3*cell)+'" rx="'+(cell*.6)+'" fill="currentColor"/>';
  };
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    const inFinder = (x<8&&y<8)||(x>=N-8&&y<8)||(x<8&&y>=N-8);
    if(inFinder) continue;
    if(rng()<.46) rects+='<rect x="'+(x*cell+cell*.08)+'" y="'+(y*cell+cell*.08)+'" width="'+(cell*.84)+'" height="'+(cell*.84)+'" rx="'+(cell*.28)+'" fill="currentColor"/>';
  }
  finder(0.5,0.5); finder(N-7.5,0.5); finder(0.5,N-7.5);
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" role="img" aria-label="QR code">'+rects+'</svg>';
  function mulberry32ish(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
};

/* ============ CHARTS (hand-rolled SVG, hover layer included) ============ */
let tipEl = null;
function tip(){ if(!tipEl){ tipEl=document.createElement("div"); tipEl.className="chart-tip"; document.body.appendChild(tipEl);} return tipEl; }
function showTip(html,x,y){ const t=tip(); t.innerHTML=html; t.style.display="block";
  const r=t.getBoundingClientRect();
  t.style.left=Math.min(innerWidth-r.width-10, Math.max(8,x+14))+"px";
  t.style.top=Math.max(8,y-r.height-12)+"px"; }
function hideTip(){ if(tipEl) tipEl.style.display="none"; }
SG.hideTip = hideTip;

const tickFmt = n => n>=1e6?(n/1e6).toFixed(1)+"M" : n>=1000?(n/1000).toFixed(1)+"k" : String(Math.round(n));
const short = d => { const dt=new Date(d); return dt.toLocaleDateString("en-GB",{day:"numeric",month:"short"}); };

/* line/area chart: data=[{date,v}] or series list */
SG.lineChart = (host, {series, height=220, money=true, color="var(--c1)"}) => {
  const el = typeof host==="string"? document.getElementById(host) : host;
  if(!el) return;
  const data = series;
  const W = Math.max(el.clientWidth||600, 280), H = height, padL=44, padR=10, padT=12, padB=24;
  const max = Math.max(...data.map(d=>d.v), 1)*1.12;
  const x = i => padL + i*(W-padL-padR)/Math.max(data.length-1,1);
  const y = v => padT + (H-padT-padB)*(1-v/max);
  let path="", area="";
  data.forEach((d,i)=>{ const c=(i?"L":"M")+x(i).toFixed(1)+" "+y(d.v).toFixed(1); path+=c; area+=c; });
  area += "L"+x(data.length-1).toFixed(1)+" "+(H-padB)+"L"+x(0).toFixed(1)+" "+(H-padB)+"Z";
  const ticks = [0,.5,1].map(f=>Math.round(max*f));
  const gid = "g"+Math.random().toString(36).slice(2,7);
  let svg = '<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block">'+
    '<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".18"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>';
  ticks.forEach(t=>{ svg+='<line x1="'+padL+'" x2="'+(W-padR)+'" y1="'+y(t)+'" y2="'+y(t)+'" stroke="var(--line)" stroke-width="1"/>'+
    '<text x="'+(padL-7)+'" y="'+(y(t)+4)+'" text-anchor="end" font-size="10.5" fill="var(--ink3)" class="num">'+tickFmt(t)+'</text>'; });
  svg += '<path d="'+area+'" fill="url(#'+gid+')"/>';
  svg += '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
  const last = data[data.length-1];
  svg += '<circle cx="'+x(data.length-1)+'" cy="'+y(last.v)+'" r="4" fill="'+color+'" stroke="var(--surface)" stroke-width="2"/>';
  const step = Math.ceil(data.length/6);
  data.forEach((d,i)=>{ if(i%step===0) svg+='<text x="'+x(i)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10.5" fill="var(--ink3)">'+short(d.date)+'</text>'; });
  svg += '<line id="xh" x1="0" x2="0" y1="'+padT+'" y2="'+(H-padB)+'" stroke="var(--ink3)" stroke-width="1" stroke-dasharray="3 3" style="display:none"/>';
  svg += '<circle id="xhd" r="4.5" fill="'+color+'" stroke="var(--surface)" stroke-width="2" style="display:none"/>';
  svg += '<rect x="'+padL+'" y="'+padT+'" width="'+(W-padL-padR)+'" height="'+(H-padT-padB)+'" fill="transparent"/></svg>';
  el.innerHTML = svg;
  const s = el.querySelector("svg"), xh=s.querySelector("#xh"), xhd=s.querySelector("#xhd");
  s.addEventListener("pointermove", ev=>{
    const r = s.getBoundingClientRect();
    const px = (ev.clientX-r.left)*(W/r.width);
    const i = Math.max(0,Math.min(data.length-1,Math.round((px-padL)/((W-padL-padR)/Math.max(data.length-1,1)))));
    const d = data[i];
    xh.style.display="block"; xh.setAttribute("x1",x(i)); xh.setAttribute("x2",x(i));
    xhd.style.display="block"; xhd.setAttribute("cx",x(i)); xhd.setAttribute("cy",y(d.v));
    showTip("<b>"+short(d.date)+"</b><div class='row' style='gap:6px'><span class='dot' style='background:"+color+"'></span>"+(money?SG.fmt(d.v):d.v)+"</div>", ev.clientX, ev.clientY);
  });
  s.addEventListener("pointerleave", ()=>{ xh.style.display="none"; xhd.style.display="none"; hideTip(); });
};

/* horizontal bar list (top products etc.) */
SG.barList = (items, {money=true}={}) => {
  const max = Math.max(...items.map(i=>i.value),1);
  return items.map((it,idx)=>
    '<div class="listrow" data-tip="'+esc(it.label)+'">'+
      (it.img||'')+
      '<div style="flex:1;min-width:0"><div class="row-between" style="margin-bottom:5px"><span style="font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.label)+'</span>'+
      '<span class="num" style="font-size:13px;font-weight:600">'+(money?SG.fmtK(it.value):it.value)+'</span></div>'+
      '<div class="progress" role="img" aria-label="'+esc(it.label)+': '+it.value+'"><i style="width:'+Math.round(it.value/max*100)+'%;background:var(--c'+((idx%5)+1)+')"></i></div>'+
      (it.sub?'<div class="small muted" style="margin-top:3px">'+it.sub+'</div>':'')+
      '</div></div>').join("");
};

/* vertical bars */
SG.barChart = (host, {data, height=200, money=true, color="var(--c2)"}) => {
  const el = typeof host==="string"? document.getElementById(host) : host;
  if(!el) return;
  const W=Math.max(el.clientWidth||600,280), H=height, padL=44,padR=8,padT=10,padB=24;
  const max=Math.max(...data.map(d=>d.v),1)*1.15;
  const bw=(W-padL-padR)/data.length;
  const y=v=>padT+(H-padT-padB)*(1-v/max);
  let svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block">';
  [0,.5,1].forEach(f=>{ const t=Math.round(max*f); svg+='<line x1="'+padL+'" x2="'+(W-padR)+'" y1="'+y(t)+'" y2="'+y(t)+'" stroke="var(--line)"/>'+
    '<text x="'+(padL-7)+'" y="'+(y(t)+4)+'" text-anchor="end" font-size="10.5" fill="var(--ink3)" class="num">'+tickFmt(t)+'</text>'; });
  data.forEach((d,i)=>{
    const bx=padL+i*bw+bw*.18, bwid=bw*.64, by=y(d.v), bh=H-padB-by;
    svg+='<rect data-i="'+i+'" x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+bwid.toFixed(1)+'" height="'+Math.max(bh,2).toFixed(1)+'" rx="4" fill="'+color+'" style="cursor:pointer"/>';
    svg+='<text x="'+(bx+bwid/2)+'" y="'+(H-7)+'" text-anchor="middle" font-size="10.5" fill="var(--ink3)">'+esc(d.label)+'</text>';
  });
  svg+='</svg>';
  el.innerHTML=svg;
  el.querySelectorAll("rect[data-i]").forEach(r=>{
    r.addEventListener("pointermove",ev=>{ const d=data[+r.dataset.i];
      showTip("<b>"+esc(d.label)+"</b>"+(money?SG.fmt(d.v):d.v), ev.clientX, ev.clientY); r.setAttribute("opacity",".8"); });
    r.addEventListener("pointerleave",()=>{ hideTip(); r.removeAttribute("opacity"); });
  });
};

/* donut */
SG.donut = (host, {data, size=150}) => {
  const el=typeof host==="string"?document.getElementById(host):host; if(!el) return;
  const total=data.reduce((s,d)=>s+d.v,0)||1, R=size/2-8, C=size/2;
  let a=-90, svg='<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';
  data.forEach((d,i)=>{
    const frac=d.v/total, a2=a+frac*360;
    const large=frac>.5?1:0;
    const p1=[C+R*Math.cos(a*Math.PI/180),C+R*Math.sin(a*Math.PI/180)];
    const p2=[C+R*Math.cos(a2*Math.PI/180),C+R*Math.sin(a2*Math.PI/180)];
    if(frac>0.001) svg+='<path data-i="'+i+'" d="M'+p1[0].toFixed(1)+' '+p1[1].toFixed(1)+' A'+R+' '+R+' 0 '+large+' 1 '+p2[0].toFixed(1)+' '+p2[1].toFixed(1)+'" fill="none" stroke="var(--c'+((i%5)+1)+')" stroke-width="15" stroke-linecap="butt" style="cursor:pointer"/>';
    a=a2+1.5;
  });
  svg+='<text x="'+C+'" y="'+(C-2)+'" text-anchor="middle" font-size="17" font-weight="700" fill="var(--ink)" class="num">'+total.toLocaleString()+'</text>';
  svg+='<text x="'+C+'" y="'+(C+15)+'" text-anchor="middle" font-size="10" fill="var(--ink3)">orders</text></svg>';
  el.innerHTML=svg;
  el.querySelectorAll("path[data-i]").forEach(p=>{
    p.addEventListener("pointermove",ev=>{ const d=data[+p.dataset.i];
      showTip("<b>"+esc(d.label)+"</b>"+d.v+" · "+Math.round(d.v/total*100)+"%",ev.clientX,ev.clientY); });
    p.addEventListener("pointerleave",hideTip);
  });
};

SG.spark = (data, w=90, h=28, color="var(--c1)") => {
  const max=Math.max(...data,1), min=Math.min(...data,0);
  const pts=data.map((v,i)=>(i*(w-4)/(data.length-1)+2).toFixed(1)+","+(h-3-(v-min)/(max-min||1)*(h-6)).toFixed(1)).join(" ");
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" aria-hidden="true"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
};

/* ---- theme ---- */
SG.getTheme = ()=>{ try{return localStorage.getItem("sayr_theme");}catch(e){return null;} };
SG.applyTheme = t => { if(t) document.documentElement.dataset.theme=t; else delete document.documentElement.dataset.theme; };
SG.toggleTheme = ()=>{
  const cur = document.documentElement.dataset.theme ||
    (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  const next = cur==="dark"?"light":"dark";
  document.documentElement.dataset.theme = next;
  try{localStorage.setItem("sayr_theme",next);}catch(e){}
  SG.render && SG.render();
};
SG.themeBtn = ()=>{
  const cur = document.documentElement.dataset.theme || (matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  return '<button class="iconbtn" data-act="theme" aria-label="Switch to '+(cur==="dark"?"light":"dark")+' mode" title="Toggle theme">'+icon(cur==="dark"?"sun":"moon",18)+'</button>';
};

/* ---- offline handling ---- */
SG.offline = { forced:false };
SG.isOffline = ()=> SG.offline.forced || !navigator.onLine;
addEventListener("online", ()=>{ SG.render&&SG.render(); SG.toast("Back online — everything synced","ok"); });
addEventListener("offline", ()=>{ SG.render&&SG.render(); });
SG.offlineBanner = ()=> SG.isOffline()
  ? '<div class="offline-banner" role="alert">'+icon("wifiOff",15)+' You\'re offline — showing cached data. Changes will sync when you reconnect.'+
    (SG.offline.forced?' <button style="text-decoration:underline;color:#fff;font-weight:700" data-act="go-online">Go online</button>':'')+'</div>'
  : "";
SG.guardOnline = (msg)=>{ if(SG.isOffline()){ SG.toast(msg||"You're offline. This action will be available when you reconnect.","warn"); return false;} return true; };
})();
</script>
<script>
/* ============ APP CORE: router, actions, launcher ============ */
(()=>{
const {icon, esc} = SG;

/* session (per-tab) */
let sess = {};
try{ sess = JSON.parse(sessionStorage.getItem("sayr_sess")||"{}"); }catch(e){}
SG.sess = sess;
SG.saveSess = ()=>{ try{sessionStorage.setItem("sayr_sess",JSON.stringify(SG.sess));}catch(e){} };

/* action registry + delegation */
SG.actions = {};
document.addEventListener("click", e=>{
  const nav = e.target.closest("[data-nav]");
  if(nav){ e.preventDefault(); SG.go(nav.dataset.nav); return; }
  const act = e.target.closest("[data-act]");
  if(act){ const fn = SG.actions[act.dataset.act]; if(fn){ e.preventDefault(); fn(act.dataset.arg, act, e); } }
});
SG.actions["theme"] = ()=> SG.toggleTheme();
SG.actions["go-online"] = ()=>{ SG.offline.forced=false; SG.toast("Back online — everything synced"); SG.render(); };
SG.actions["go-offline"] = ()=>{ SG.offline.forced=true; SG.render(); };
SG.actions["reset-demo"] = ()=> SG.confirm({title:"Reset demo data", danger:true, okLabel:"Reset everything",
  message:"This restores the original seeded catalog, orders and settings. Anything you created in this session will be removed.", cb:()=>SG.resetDB()});

/* router */
SG.go = h => { if(location.hash===h){ SG.render(); } else location.hash = h; };
SG.route = ()=> {
  const parts = location.hash.replace(/^#\/?/,"").split("/").filter(Boolean);
  return {app:parts[0]||"", page:parts[1]||"", arg:parts[2]||""};
};
const loaded = new Set();          /* routes that already "fetched" */
SG.loadOnce = (key, ms) => {       /* returns true if still loading; schedules re-render */
  if(loaded.has(key)) return false;
  setTimeout(()=>{ loaded.add(key); SG.render(); }, ms||(280+Math.random()*260));
  return true;
};
SG.invalidate = key => loaded.delete(key);

let mountCleanup = null;
SG.onCleanup = fn => { mountCleanup = fn; };
SG.render = ()=>{
  if(mountCleanup){ try{mountCleanup();}catch(e){} mountCleanup=null; }
  SG.hideTip();
  const r = SG.route();
  const root = document.getElementById("root");
  const app = SG.apps[r.app] || SG.apps.launcher;
  app(root, r);
  if(SG.demoTick) SG.demoTick(r);
};
addEventListener("hashchange", SG.render);
addEventListener("resize", (()=>{ let t; return ()=>{ clearTimeout(t); t=setTimeout(()=>{ const r=SG.route(); if(r.app) SG.render(); },200); }; })());

/* notification hook → toast when relevant app not focused */
SG.onNotify = (audience, title)=>{
  const cur = SG.route().app;
  const map = {customer:"customer", merchant:"merchant", vendor:"vendor"};
  if(map[audience]!==cur) return; /* toasts for in-app arrivals handled by flows */
};

/* ============ LAUNCHER ============ */
SG.apps = {};
SG.apps.launcher = (root)=>{
  document.title = "Sayr — Scan & Go Commerce Platform";
  const roles = [
    {id:"customer", ic:"phone", color:"var(--c1)", name:"Customer App", desc:"Scan the shelf, skip the line. Shop Nora Boutique as a customer.", go:"#/customer/splash"},
    {id:"merchant", ic:"store", color:"var(--c2)", name:"Merchant Back Office", desc:"Dashboard, POS checkout, products, inventory, vendors and reports.", go:"#/merchant/dashboard"},
    {id:"vendor",   ic:"layers", color:"var(--c3)", name:"Vendor Portal", desc:"Dune Atelier's view: their products, sales and daily digests.", go:"#/vendor/home"},
    {id:"admin",    ic:"globe", color:"var(--c4)", name:"Platform Admin", desc:"Tenants, MRR, platform health, support and API usage.", go:"#/admin/overview"},
  ];
  root.innerHTML = SG.offlineBanner()+
  '<div class="launcher">'+
    '<div style="position:absolute;top:18px;right:18px;display:flex;gap:6px">'+SG.themeBtn()+'</div>'+
    '<div class="wordmark"><div class="logo-mark">'+icon("scan",24)+'</div><h1>Sayr</h1></div>'+
    '<div class="eyebrow" style="margin-bottom:6px">Scan &amp; Go commerce platform</div>'+
    '<p class="tag">One platform connecting shoppers, cashiers, store owners, brand vendors and the platform itself — pick a seat and explore. Every role below shares the same live data.</p>'+
    '<div class="role-grid">'+roles.map(r=>
      '<button class="role-card" data-nav="'+r.go+'">'+
        '<div class="role-ic" style="background:color-mix(in oklab,'+r.color+' 16%,var(--surface));color:'+r.color+'">'+icon(r.ic,22)+'</div>'+
        '<h3>'+r.name+'</h3><p>'+r.desc+'</p>'+
        '<span class="go">Open '+icon("chevR",14)+'</span></button>').join("")+
    '</div>'+
    '<div class="launcher-foot">'+
      '<button class="btn btn-pri btn-lg" data-act="demo-start">'+icon("play",17)+' Play the guided demo</button>'+
      '<button class="btn btn-ghost" data-act="reset-demo">'+icon("refresh",15)+' Reset demo data</button>'+
    '</div>'+
    '<p class="small muted" style="margin-top:26px;max-width:520px;text-align:center">Simulated environment with seeded data for Nora Boutique, Muscat &amp; Salalah. A sale completed at the POS updates inventory, vendor feeds, loyalty and every report in real time.</p>'+
  '</div>';
};
})();
</script>
<script>
/* ============ CUSTOMER APP ============ */
(()=>{
const {DB, icon, esc, fmt, pimg} = SG;

const tabs = [
  {id:"home", ic:"home", label:"Shop"},
  {id:"scan", ic:"scan", label:"Scan"},
  {id:"cart", ic:"cart", label:"Cart"},
  {id:"orders", ic:"receipt", label:"Orders"},
  {id:"profile", ic:"user", label:"Profile"},
];
const cartCount = ()=> DB.cart.items.reduce((s,i)=>s+i.qty,0);

function frame(page, inner, {tabbar=true, header=""}={}) {
  const badge = cartCount();
  return SG.offlineBanner()+
  '<div class="phone-stage"><div class="stage-side">'+SG.themeBtn()+
    '<button class="iconbtn" data-nav="#/" aria-label="Back to launcher" title="Back to launcher">'+icon("grid",18)+'</button>'+
    '<button class="iconbtn" data-act="'+(SG.offline.forced?'go-online':'go-offline')+'" aria-label="Toggle offline simulation" title="Simulate offline">'+icon("wifiOff",18)+'</button>'+
  '</div>'+
  '<div class="phone"><div class="phone-screen" id="screen">'+header+
    '<div class="screen-body screen-enter">'+inner+'</div></div>'+
  (tabbar?'<nav class="tabbar" aria-label="Main">'+tabs.map(t=>
    '<button class="tab'+(t.id===page?' active':'')+'" data-nav="#/customer/'+t.id+'" aria-label="'+t.label+'">'+
    icon(t.ic,21)+'<span>'+t.label+'</span>'+
    (t.id==="cart"&&badge?'<span class="badge num">'+badge+'</span>':'')+'</button>').join("")+'</nav>':'')+
  '</div></div>';
}
const head = (title, extra)=>'<div class="phone-header"><h2>'+title+'</h2>'+(extra||"")+'</div>';
const backHead = (title, to)=>'<div class="phone-header"><button class="iconbtn" data-nav="'+to+'" aria-label="Back">'+icon("chevL",19)+'</button><h2>'+title+'</h2></div>';

function guard(r){
  if(!SG.sess.custAuthed && !["splash","auth"].includes(r.page)) { SG.go("#/customer/auth"); return true; }
  if(SG.sess.custAuthed && !DB.cart.branch && !["splash","auth","entrance","profile","orders","notifications","receipt"].includes(r.page)){ SG.go("#/customer/entrance"); return true; }
  return false;
}

SG.apps.customer = (root, r)=>{
  document.title = "Sayr — Shop";
  if(guard(r)) return;
  const pages = {splash, auth, entrance, home, scan, product, cart, coupon:cart, checkout, pay, receipt, orders, profile, notifications};
  (pages[r.page]||home)(root, r);
};

/* ---- splash ---- */
function splash(root){
  root.innerHTML = frame("", '<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:420px">'+
    '<div class="logo-mark" style="width:76px;height:76px;border-radius:24px;animation:screenIn .5s var(--ease)">'+icon("scan",38)+'</div>'+
    '<h2 style="font-size:30px;letter-spacing:-.02em">Sayr</h2>'+
    '<p class="muted" style="text-align:center">Scan the shelf.<br>Skip the line.</p>'+
    '<div class="skel" style="width:120px;height:5px;border-radius:99px;margin-top:16px"></div></div>', {tabbar:false});
  const t = setTimeout(()=> SG.go(SG.sess.custAuthed ? (DB.cart.branch?"#/customer/home":"#/customer/entrance") : "#/customer/auth"), 1300);
  SG.onCleanup(()=>clearTimeout(t));
}

/* ---- auth ---- */
function auth(root){
  root.innerHTML = frame("", '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;min-height:420px">'+
    '<div class="logo-mark" style="width:52px;height:52px;border-radius:16px">'+icon("scan",26)+'</div>'+

      '<button class="btn btn-pri" data-act="pd-add" data-arg="'+p.id+'" '+(stock===0?'disabled':'')+'>'+icon("cart",17)+' Add to cart</button></div>'+
    (inCart?'<p class="small" style="color:var(--accent-ink);text-align:center;font-weight:600">'+inCart.qty+' already in your cart</p>':'')+

/* ---- checkout QR ---- */
function checkout(root){
  if(!DB.cart.items.length && DB.lastOrder){ SG.go("#/customer/receipt/"+DB.lastOrder.id); return; }
  if(!DB.checkoutToken){ SG.go("#/customer/cart"); return; }
  const t = SG.cartTotals();
  root.innerHTML = frame("cart", backHead("Checkout","#/customer/cart")+
    '<div class="card card-pad" style="display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center">'+
      '<div class="eyebrow">Show this to the cashier</div>'+
      '<div style="color:var(--ink);background:var(--surface);padding:6px;border-radius:14px" id="chk-qr">'+SG.qrSVG(DB.checkoutToken.token,190)+'</div>'+
      '<div class="num" style="font-family:var(--font-m);font-size:13px;color:var(--ink2)">'+DB.checkoutToken.token+'</div>'+
      '<div class="row" style="justify-content:center"><span class="chip chip-accent" id="chk-timer">'+icon("clock",13)+' expires in 5:00</span>'+
      '<span class="chip chip-neutral num">'+fmt(t.total)+'</span></div>'+
      '<div class="row" style="color:var(--ink3);font-size:12.5px;gap:6px" id="chk-wait"><span class="skel" style="width:8px;height:8px;border-radius:50%"></span> Waiting for the cashier to scan…</div>'+
    '</div>'+
    '<div class="card card-pad col" style="gap:10px"><b style="font-size:14px">In a hurry? Pay in the app</b>'+
      '<p class="small muted" style="margin-top:-6px">Pay now and show your receipt at the exit gate instead.</p>'+
      '<button class="btn btn-pri btn-block" data-act="pay-inapp">'+icon("wallet",17)+' Pay '+fmt(t.total)+' now</button></div>'+
    '<p class="small muted" style="text-align:center">Tip: open the <a data-nav="#/merchant/pos" href="#/merchant/pos">cashier station</a> in the Merchant app to scan this code.</p>');
  const start = DB.checkoutToken.issued;
  const iv = setInterval(()=>{
    if(!document.getElementById("chk-timer")){ clearInterval(iv); return; }
    if(!DB.checkoutToken){ clearInterval(iv); if(DB.lastOrder) SG.go("#/customer/receipt/"+DB.lastOrder.id); return; }
    const left = Math.max(0, 5*60 - Math.floor((Date.now()-start)/1e3));
    document.getElementById("chk-timer").innerHTML = icon("clock",13)+" expires in "+Math.floor(left/60)+":"+String(left%60).padStart(2,"0");
    if(DB.posOrder) document.getElementById("chk-wait").innerHTML = icon("check",14)+' <span style="color:var(--good);font-weight:600">Cashier connected — completing your payment…</span>';
    if(left===0){ clearInterval(iv); SG.toast("Checkout code expired — generate a fresh one","warn"); SG.issueCheckoutToken(); SG.render(); }
  }, 500);
  SG.onCleanup(()=>clearInterval(iv));
}
SG.actions["pay-inapp"]=()=> SG.go("#/customer/pay");

      '<button class="btn btn-lg btn-block" style="background:#000;color:#fff" data-act="pay-method" data-arg="applepay">'+icon("phone",18)+'  Pay</button>'+
      '<div class="row" style="gap:8px;color:var(--ink3);font-size:12px"><hr class="divider" style="flex:1">or card<hr class="divider" style="flex:1"></div>'+
      '<div class="field"><label for="cc-num">Card number</label><input class="input num" id="cc-num" inputmode="numeric" placeholder="4242 4242 4242 4242" maxlength="19"></div>'+
      '<div class="row"><div class="field" style="flex:1"><label for="cc-exp">Expiry</label><input class="input num" id="cc-exp" placeholder="12/28" maxlength="5"></div>'+
      '<div class="field" style="flex:1"><label for="cc-cvc">CVC</label><input class="input num" id="cc-cvc" placeholder="123" maxlength="4"></div></div>'+
      '<button class="btn btn-pri btn-lg btn-block" data-act="pay-method" data-arg="card">'+icon("card",18)+' Pay '+fmt(t.total)+'</button>'+
      '<p class="small muted" style="text-align:center">Test cards: 4242… succeeds · 4000… is declined</p>'+
    '</div>');
  const num=root.querySelector("#cc-num"), exp=root.querySelector("#cc-exp");
  num.addEventListener("input",()=>{ num.value=num.value.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim(); });
  exp.addEventListener("input",()=>{ let v=exp.value.replace(/\D/g,"").slice(0,4); if(v.length>2)v=v.slice(0,2)+"/"+v.slice(2); exp.value=v; });
}
SG.actions["pay-method"]=(method)=>{
  if(!SG.guardOnline("Payment needs a connection.")) return;
  const box=document.getElementById("pay-box");
  if(method==="card"){
    const numEl=document.getElementById("cc-num");
    const num=numEl.value.replace(/\s/g,"");
    if(num.length<16){ numEl.classList.add("invalid"); SG.toast("Enter a full 16-digit card number","warn"); return; }
    if(num.startsWith("4000")){
      box.innerHTML='<div class="state" style="padding:28px 10px"><div class="state-icon" style="color:var(--crit);background:var(--crit-soft)">'+icon("alert",26)+'</div>'+
        '<h3>Card declined</h3><p>Your bank declined this payment (code: insufficient_funds). No charge was made — try another card or pay at the till.</p>'+
        '<button class="btn btn-pri" data-nav="#/customer/pay">Try again</button></div>';
      return;
    }
  }
  box.innerHTML='<div class="state" style="padding:40px 10px"><div class="skel" style="width:44px;height:44px;border-radius:50%"></div><h3 style="margin-top:12px">Processing payment…</h3><p>Talking to your bank. Don\'t close the app.</p></div>';
  setTimeout(()=>{
    const res = SG.posComplete(method==="applepay"?"applepay":"card", "e3");
    if(!res.ok){ SG.toast(res.err,"err"); SG.go("#/customer/cart"); return; }
    SG.toast("Payment successful — +"+res.points+" points");
    SG.go("#/customer/receipt/"+res.order.id);
  }, 1400);
};

/* ---- receipt ---- */
function receipt(root, r){
  const o = DB.orders.find(x=>x.id===r.arg) || DB.lastOrder;
  if(!o){ root.innerHTML = frame("orders", SG.errorState("cust-back-home")); return; }
  const br = SG.branchById(o.branch);
  root.innerHTML = frame("orders", backHead("Receipt","#/customer/orders")+
    (o.live?'<div class="state" style="padding:8px 0 2px"><div class="state-icon" style="background:var(--good-soft);color:var(--good);animation:screenIn .5s var(--ease)">'+icon("check",28)+'</div>'+
      '<h3>Payment complete</h3><p>You\'re free to go — gates will read this receipt.</p></div>':'')+
    '<div class="receipt-paper" id="print-area">'+
      '<div style="text-align:center;margin-bottom:12px"><b style="font-size:15px;letter-spacing:.06em">'+esc(DB.storeName.toUpperCase())+'</b>'+
      '<div style="opacity:.7">'+esc(br?br.name:"")+'<br>VAT '+DB.settings.vat+'</div></div>'+
      '<div class="rrow"><span>'+o.id+'</span><span>'+SG.fmtDate(o.ts)+' '+SG.fmtTime(o.ts)+'</span></div>'+
      '<div class="rrow"><span>Cashier</span><span>'+esc((SG.empById(o.cashierId)||{}).name||"—")+'</span></div>'+
      '<div style="border-top:1px dashed var(--line2);margin:8px 0"></div>'+
      o.items.map(it=>'<div class="rrow"><span>'+it.qty+' × '+esc(it.name)+'</span><span>'+fmt(it.price*it.qty)+'</span></div>').join("")+
      '<div style="border-top:1px dashed var(--line2);margin:8px 0"></div>'+
      '<div class="rrow"><span>Subtotal</span><span>'+fmt(o.sub)+'</span></div>'+
      (o.disc?'<div class="rrow"><span>Discount'+(o.coupon?' ('+o.coupon+')':'')+'</span><span>−'+fmt(o.disc)+'</span></div>':'')+
      '<div class="rrow"><span>VAT '+DB.settings.taxRate+'%</span><span>'+fmt(o.tax)+'</span></div>'+
      '<div class="rrow" style="font-weight:700;font-size:14px"><span>TOTAL</span><span>'+fmt(o.total)+'</span></div>'+
      '<div class="rrow"><span>Paid via</span><span>'+(o.method==="applepay"?"Apple Pay":o.method.toUpperCase())+'</span></div>'+
      '<div style="display:flex;justify-content:center;margin:14px 0 6px;color:var(--ink)">'+SG.qrSVG("ZATCA|"+o.id+"|"+o.total,92)+'</div>'+
      '<div style="text-align:center;opacity:.7">'+esc(DB.settings.receiptFooter)+'</div>'+
    '</div>'+
    '<div class="row"><button class="btn btn-sec btn-block" data-act="receipt-print">'+icon("print",16)+' Print</button>'+
    '<button class="btn btn-sec btn-block" data-act="receipt-share">'+icon("upload",16)+' Share</button></div>'+
    '<button class="btn btn-ghost btn-block" data-nav="#/customer/home">Done</button>');
}
SG.actions["receipt-print"]=()=>window.print();
SG.actions["receipt-share"]=()=>SG.toast("Receipt link copied to clipboard");

/* ---- order history ---- */
function orders(root){
  if(SG.loadOnce("cust-orders")){ root.innerHTML = frame("orders", head("Purchases")+SG.skelRows(5,74)); return; }
  const mine = DB.orders.filter(o=>o.customer===DB.customer.name).sort((a,b)=>b.ts-a.ts).slice(0,20);
  root.innerHTML = frame("orders", head("Purchases")+
    (mine.length? '<div class="col" style="gap:10px">'+mine.map(o=>
      '<button class="card row" data-nav="#/customer/receipt/'+o.id+'" style="padding:13px;text-align:left">'+
      '<div class="role-ic" style="width:40px;height:40px;border-radius:11px;background:var(--accent-soft);color:var(--accent-ink);display:flex;align-items:center;justify-content:center">'+icon("receipt",19)+'</div>'+
      '<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:14px">'+esc(DB.storeName)+' <span class="muted small">· '+o.id+'</span></div>'+
      '<div class="small muted">'+SG.fmtDate(o.ts)+' · '+o.items.reduce((s,i)=>s+i.qty,0)+' items</div></div>'+
      '<div style="text-align:right"><b class="num">'+fmt(o.total)+'</b><div class="small" style="color:var(--good)">+'+Math.round(o.total/10*1.5)+' pts</div></div></button>').join("")+'</div>'
    : SG.emptyState("receipt","No purchases yet","Your receipts will live here after your first checkout.",
      '<button class="btn btn-pri" data-nav="#/customer/home">Start shopping</button>')));
}

/* ---- notifications ---- */
function notifications(root){
  const list = DB.notifications.customer;
  root.innerHTML = frame("home", backHead("Notifications","#/customer/home")+
    (list.length?'<div class="col" style="gap:8px">'+list.map(n=>
      '<div class="card row" style="padding:12px;'+(n.read?'':'border-color:var(--accent)')+'">'+
      '<div class="role-ic" style="width:38px;height:38px;border-radius:10px;background:var(--surface2);color:var(--ink2);display:flex;align-items:center;justify-content:center">'+icon(n.icon,18)+'</div>'+
      '<div style="flex:1"><div style="font-size:13.5px;font-weight:600">'+esc(n.title)+'</div>'+
      '<div class="small muted">'+esc(n.body)+'</div><div class="small" style="color:var(--ink3);margin-top:2px">'+SG.timeAgo(n.ts)+'</div></div></div>').join("")+'</div>'
    : SG.emptyState("bell","All caught up","Offers and receipts will appear here.")));
  list.forEach(n=>n.read=true); SG.save();
}

/* ---- profile ---- */
function profile(root){
  const c = DB.customer;
  const nextTier = 500;
  root.innerHTML = frame("profile", head("Profile", SG.themeBtn())+
    '<div class="card card-pad row"><div class="avatar" style="width:52px;height:52px;font-size:18px;background:var(--accent-soft);color:var(--accent-ink)">'+esc(c.name[0])+'</div>'+
    '<div style="flex:1"><b style="font-size:16px">'+esc(c.name)+'</b><div class="small muted">'+esc(c.email)+'</div></div></div>'+
    '<div class="card card-pad" style="background:linear-gradient(120deg,var(--accent),var(--accent-ink));color:var(--on-accent);border:0">'+
      '<div class="row-between"><div><div style="font-size:12px;opacity:.8;letter-spacing:.06em;text-transform:uppercase">Sayr Loyalty · '+esc(c.tier)+'</div>'+
      '<div style="font-family:var(--font-d);font-size:30px;font-weight:700" class="num">'+c.points.toLocaleString()+' pts</div></div>'+icon("gift",30)+'</div>'+
      '<div class="progress" style="background:rgba(255,255,255,.25);margin-top:12px"><i style="width:'+Math.min(100,Math.round(c.points/nextTier*100))+'%;background:#fff"></i></div>'+
      '<div style="font-size:12px;opacity:.85;margin-top:6px">'+(c.points>=nextTier?"You've unlocked Platinum rewards":(nextTier-c.points)+" pts to Platinum")+'</div></div>'+
    '<div class="card">'+[
      {ic:"receipt",label:"Purchase history",nav:"#/customer/orders"},
      {ic:"bell",label:"Notifications",nav:"#/customer/notifications"},
      {ic:"store",label:"Switch store / branch",nav:"#/customer/entrance"},
      {ic:"card",label:"Payment methods",act:"cust-paymethods"},
    ].map(i=>'<button class="listrow" style="width:100%;text-align:left;padding:13px 16px" '+(i.nav?'data-nav="'+i.nav+'"':'data-act="'+i.act+'"')+'>'+
      icon(i.ic,19)+'<span style="flex:1;font-size:14px;font-weight:500">'+i.label+'</span>'+icon("chevR",16)+'</button>').join("")+'</div>'+
    '<button class="btn btn-ghost btn-block" data-act="cust-logout" style="color:var(--crit)">'+icon("logout",16)+' Sign out</button>');
}
SG.actions["cust-paymethods"]=()=> SG.dialog({title:"Payment methods",
  body:'<div class="listrow">'+icon("phone",18)+'<span style="flex:1">Apple Pay</span><span class="chip chip-good">Default</span></div>'+
       '<div class="listrow">'+icon("card",18)+'<span style="flex:1">Visa •••• 4242</span><span class="chip chip-neutral">12/28</span></div>'+
       '<button class="btn btn-sec btn-block" data-close>'+icon("plus",15)+' Add a card</button>',
  actions:'<button class="btn btn-pri" data-close>Done</button>'});
SG.actions["cust-logout"]=()=> SG.confirm({title:"Sign out?", okLabel:"Sign out", message:"Your cart and points are saved to your account.", cb:()=>{
  SG.sess.custAuthed=false; SG.saveSess(); SG.go("#/customer/auth");
}});
})();
</script>
<script>
/* ============ MERCHANT APP — shell, dashboard, POS, orders, products ============ */
(()=>{
const {DB, icon, esc, fmt, fmtK, pimg} = SG;

const NAV = [
  {sec:null, items:[
    {id:"dashboard", ic:"home", label:"Dashboard"},
    {id:"pos", ic:"scan", label:"POS Checkout", live:()=>DB.checkoutToken?1:0},
    {id:"orders", ic:"receipt", label:"Orders"},
  ]},
  {sec:"Catalog", items:[
    {id:"products", ic:"box", label:"Products"},
    {id:"inventory", ic:"layers", label:"Inventory", live:()=>SG.lowStockList().length},
    {id:"labels", ic:"qr", label:"QR Labels"},
  ]},
  {sec:"People", items:[
    {id:"vendors", ic:"users", label:"Vendors"},
    {id:"employees", ic:"user", label:"Employees"},
    {id:"branches", ic:"building", label:"Branches"},
  ]},
  {sec:"Intelligence", items:[
    {id:"reports", ic:"chart", label:"Reports"},
    {id:"insights", ic:"sparkle", label:"AI Insights"},
  ]},
];
const FOOT = [
  {id:"settings", ic:"settings", label:"Settings"},
  {id:"subscription", ic:"card", label:"Subscription"},
];
const TITLES = {dashboard:"Dashboard", pos:"POS Checkout", orders:"Orders", products:"Products", inventory:"Inventory",
  labels:"QR Labels", vendors:"Vendors", employees:"Employees", branches:"Branches", reports:"Reports",
  insights:"AI Insights", settings:"Settings", subscription:"Subscription", notifications:"Notifications", order:"Order"};

function shell(page, inner, {toolbar=""}={}) {
  const unread = DB.notifications.merchant.filter(n=>!n.read).length;
  const navHTML = g => g.items.map(n=>{
    const live = n.live? n.live() : 0;
    return '<button class="navlink'+(n.id===page?' active':'')+'" data-nav="#/merchant/'+n.id+'">'+icon(n.ic,18)+n.label+
      (live?'<span class="badge num">'+live+'</span>':'')+'</button>';}).join("");
  return SG.offlineBanner()+
  '<div class="shell"><aside class="sidebar">'+
    '<button class="brand" data-nav="#/" title="Back to launcher" style="text-align:left">'+
      '<div class="logo-mark">'+icon("scan",18)+'</div>'+
      '<div><b>'+esc(DB.storeName)+'</b><span>Business plan · 2 branches</span></div></button>'+
    NAV.map(g=>(g.sec?'<div class="nav-section eyebrow">'+g.sec+'</div>':'')+navHTML(g)).join("")+
    '<div class="sidebar-foot">'+FOOT.map(n=>'<button class="navlink'+(n.id===page?' active':'')+'" data-nav="#/merchant/'+n.id+'">'+icon(n.ic,18)+n.label+'</button>').join("")+
    '<div class="row" style="padding:8px 8px 0"><div class="avatar">NA</div><div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600">Noura Al-Fahad</div><div style="font-size:11px;color:var(--ink3)">Owner</div></div>'+
    '<button class="iconbtn" data-nav="#/" aria-label="Exit to launcher">'+icon("logout",16)+'</button></div></div>'+
  '</aside><div class="main">'+
    '<header class="topbar"><h1>'+ (TITLES[page]||"") +'</h1>'+toolbar+
      '<button class="iconbtn" data-act="'+(SG.offline.forced?'go-online':'go-offline')+'" title="Simulate offline" aria-label="Simulate offline">'+icon("wifiOff",17)+'</button>'+
      SG.themeBtn()+
      '<button class="iconbtn" data-nav="#/merchant/notifications" style="position:relative" aria-label="Notifications ('+unread+' unread)">'+icon("bell",18)+
      (unread?'<span style="position:absolute;top:6px;right:7px;min-width:8px;height:8px;border-radius:50%;background:var(--crit)"></span>':'')+'</button>'+
    '</header>'+
    '<div class="content"><div class="content-inner">'+inner+'</div></div>'+
    '<nav class="mobile-nav">'+["dashboard","pos","orders","products","reports"].map(id=>{
      const n = NAV.flatMap(g=>g.items).find(x=>x.id===id)||FOOT.find(x=>x.id===id);
      return '<button class="tab'+(id===page?' active':'')+'" data-nav="#/merchant/'+id+'">'+icon(n.ic,20)+'<span>'+n.label.split(" ")[0]+'</span></button>';}).join("")+
    '</nav></div></div>';
}

SG.mpages = {dashboard, pos, orders, order, products}; /* part B adds the rest */
SG.apps.merchant = (root, r)=>{
  document.title = "Sayr — "+(TITLES[r.page]||"Merchant");
  (SG.mpages[r.page]||dashboard)(root, r);
};
SG.merchantShell = shell; /* shared with part B */

/* ---------- DASHBOARD ---------- */
function dashboard(root){
  if(SG.loadOnce("m-dash")){ root.innerHTML = shell("dashboard", SG.skelDash()); return; }
  const range = SG.sess.mRange||30;
  const branch = SG.sess.mBranch||"";
  const os = SG.ordersSince(range, branch||null);
  const sales = SG.sumSales(os);
  const delta = SG.deltaPct(range, branch||null);
  const aov = os.length? sales/os.length : 0;
  const today = SG.ordersSince(1, branch||null);
  const low = SG.lowStockList();
  const top = SG.topProducts(range, 5);
  const activeCashiers = [...new Set(SG.ordersSince(1).map(o=>o.cashierId))].map(id=>SG.empById(id)).filter(Boolean);
  const byMethod = ["card","applepay","cash"].map(m=>({label:m==="applepay"?"Apple Pay":m==="card"?"Card":"Cash", v:os.filter(o=>o.method===m).length})).filter(d=>d.v);
  const kpi = (label,val,d,ic)=>'<div class="kpi"><span class="kpi-label">'+icon(ic,14)+label+'</span><span class="kpi-value num">'+val+'</span>'+
    (d!=null?'<span class="kpi-delta '+(d>=0?"up":"down")+'">'+icon(d>=0?"arrowUp":"chevD",13)+' '+Math.abs(d)+'% vs prev. period</span>':'<span class="kpi-delta muted">&nbsp;</span>')+'</div>';
  root.innerHTML = shell("dashboard",
    '<div class="row-between wrap"><div class="row wrap">'+
      '<div class="seg" role="tablist">'+[7,30,90].map(d=>'<button class="'+(range===d?'active':'')+'" data-act="m-range" data-arg="'+d+'" role="tab" aria-selected="'+(range===d)+'">'+d+'d</button>').join("")+'</div>'+
      '<select class="input" style="width:auto" data-sel="m-branch" aria-label="Branch filter">'+
        '<option value="">All branches</option>'+DB.branches.map(b=>'<option value="'+b.id+'"'+(branch===b.id?' selected':'')+'>'+esc(b.name)+'</option>').join("")+'</select></div>'+
      '<button class="btn btn-sec" data-nav="#/merchant/pos">'+icon("scan",16)+' Open cashier station</button></div>'+
    '<div class="kpis">'+
      kpi("Revenue ("+range+"d)", fmtK(sales), delta, "chart")+
      kpi("Orders", os.length.toLocaleString(), null, "receipt")+
      kpi("Avg. basket", fmt(aov), null, "cart")+
      kpi("Today", fmtK(SG.sumSales(today)), null, "zap")+
    '</div>'+
    '<div class="chart-card"><div class="chart-h"><h3>Revenue — last '+range+' days</h3>'+
      '<div class="chart-legend"><span class="lg"><span class="sw" style="background:var(--c1)"></span>Net sales (OMR)</span></div></div>'+
      '<div id="dash-line"></div></div>'+
    '<div class="grid2">'+
      '<div class="chart-card"><div class="chart-h"><h3>Top products</h3><button class="btn btn-ghost btn-sm" data-nav="#/merchant/reports">Full report</button></div>'+
        SG.barList(top.map(t=>({label:t.name, value:Math.round(t.revenue), sub:t.units+" units", img:pimg({emoji:t.emoji,grad:t.grad},34,9)})))+'</div>'+
      '<div class="col">'+
        '<div class="chart-card"><div class="chart-h"><h3>Payment mix</h3></div><div class="row" style="gap:18px;flex-wrap:wrap"><div id="dash-donut"></div>'+
          '<div class="chart-legend" style="flex-direction:column;align-items:flex-start;gap:8px">'+byMethod.map((d,i)=>'<span class="lg"><span class="sw" style="background:var(--c'+(i+1)+')"></span>'+d.label+' — <b class="num">'+d.v+'</b></span>').join("")+'</div></div></div>'+
        '<div class="card card-pad"><div class="row-between" style="margin-bottom:8px"><h3 style="font-size:15px">Cashiers active today</h3><button class="btn btn-ghost btn-sm" data-nav="#/merchant/employees">Manage</button></div>'+
        (activeCashiers.length? activeCashiers.map(e=>'<div class="listrow"><div class="avatar">'+esc(e.name.split(" ").map(w=>w[0]).join("").slice(0,2))+'</div>'+
          '<div style="flex:1"><div style="font-size:13.5px;font-weight:600">'+esc(e.name)+'</div><div class="small muted">'+esc(SG.branchById(e.branch).name)+'</div></div>'+
          '<span class="chip chip-good"><span class="dot" style="background:var(--good)"></span>On shift</span></div>').join("")
        : '<p class="small muted">No sales yet today.</p>')+'</div></div></div>'+
    (low.length?'<div class="card card-pad"><div class="row-between" style="margin-bottom:6px"><h3 style="font-size:15px">'+icon("alert",16)+' Low stock — needs a restock order</h3>'+
      '<button class="btn btn-ghost btn-sm" data-nav="#/merchant/inventory">Open inventory</button></div>'+
      '<div class="row wrap">'+low.slice(0,4).map(l=>'<span class="chip chip-warn">'+esc(l.p.name)+' · '+l.qty+' left · '+esc(l.branch.name.split("—")[0])+'</span>').join("")+'</div></div>':''));
  SG.lineChart("dash-line", {series:SG.seriesDaily(range, branch||null), height:230});
  SG.donut("dash-donut", {data:byMethod, size:140});
  wireSelect(root);
}
SG.actions["m-range"]=d=>{ SG.sess.mRange=+d; SG.saveSess(); SG.invalidate("m-dash"); SG.render(); };
function wireSelect(root){
  root.querySelectorAll("[data-sel]").forEach(s=>s.addEventListener("change",()=>{
    if(s.dataset.sel==="m-branch"){ SG.sess.mBranch=s.value; SG.saveSess(); SG.render(); }
  }));
}

/* ---------- POS ---------- */
function pos(root){
  const t = DB.posOrder ? SG.cartTotals({...DB.cart, posDisc:DB.posOrder.posDisc}) : null;
  let inner;
  if(!DB.posOrder){
    inner =
    '<div class="card" style="max-width:560px;margin:0 auto;width:100%"><div class="card-pad" style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;padding:34px 24px">'+
      '<div class="eyebrow">Cashier station · '+esc(SG.branchById(DB.cart.branch||"b1").name)+'</div>'+
      '<div class="scanner" style="width:100%;max-width:360px;min-height:240px;border-radius:18px;flex:none">'+
        '<div class="scan-reticle" style="width:150px;height:150px"><div class="scan-line"></div></div>'+
        (DB.checkoutToken?'<button class="scan-chip" style="position:absolute;bottom:14px" data-act="pos-scan">'+icon("qr",15)+' Scan customer code '+DB.checkoutToken.token+'</button>'
          :'<p style="color:#9FB5AB;font-size:12.5px;position:absolute;bottom:18px;padding:0 20px">Waiting for a customer checkout QR… none active right now.</p>')+
      '</div>'+
      '<h3 style="font-size:17px">'+(DB.checkoutToken?"Customer is ready to check out":"No active checkout")+'</h3>'+
      '<p class="muted small" style="max-width:340px">'+(DB.checkoutToken
        ?"A checkout code was generated "+SG.timeAgo(DB.checkoutToken.issued)+". Scan it to pull the cart onto this register."
        :"When a shopper taps “Checkout” in the customer app, their code appears here instantly. You can open the customer app from the launcher to create one.")+'</p>'+
      (DB.checkoutToken?'<button class="btn btn-pri btn-lg" data-act="pos-scan">'+icon("scan",18)+' Scan checkout QR</button>'
        :'<button class="btn btn-sec" data-nav="#/customer/cart">Open the customer app</button>')+
    '</div></div>';
  } else {
    inner =
    '<div class="grid2" style="align-items:start">'+
      '<div class="card"><div class="card-pad">'+

      shown.map(p=>{ const tot=(p.stock.b1||0)+(p.stock.b2||0); const v=p.vendorId?SG.vendorById(p.vendorId):null;

        '<td class="r"><div class="row" style="gap:2px;justify-content:flex-end">'+
          '<button class="iconbtn" style="width:30px;height:30px" data-act="mp-edit" data-arg="'+p.id+'" aria-label="Edit '+esc(p.name)+'">'+icon("edit",15)+'</button>'+
